# .github/workflows/test-runner.yml
name: Test Self-Hosted Runner

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: rider-runner-kadiri    # ← must match runnerScaleSetName exactly
    steps:
      - uses: actions/checkout@v4

      - name: Verify runner
        run: |
          echo "✅ Runner is working!"
          echo "Hostname: $(hostname)"

      - name: Verify Docker
        run: |
          docker --version
          docker ps


    ######## Optional: Run a test container to verify Docker is fully functional